server:
  port: ${PORT:9741}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/syncscore}
    username: ${SPRING_DATASOURCE_USERNAME:syncscore}
    password: ${SPRING_DATASOURCE_PASSWORD:syncscore}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  otp:
    signup-ttl-seconds: ${APP_OTP_SIGNUP_TTL_SECONDS:600}
    resend-cooldown-seconds: ${APP_OTP_RESEND_COOLDOWN_SECONDS:60}
  jwt:
    issuer: ${APP_JWT_ISSUER:sync-score}
    secret-base64: ${APP_JWT_SECRET_BASE64:c3luYy1zY29yZS1kZXYtc2VjcmV0LXN5bmMtc2NvcmUtZGV2LXNlY3JldA==}
  refresh:
    pepper: ${APP_REFRESH_PEPPER:dev-refresh-pepper-change-me}
  google:
    client-id: ${APP_GOOGLE_CLIENT_ID:}
  integrity:
    enabled: ${APP_INTEGRITY_ENABLED:true}
    freshness-threshold-days: ${APP_INTEGRITY_FRESHNESS_THRESHOLD_DAYS:14}
    cron: ${APP_INTEGRITY_CRON:0 0 2 * * *}
  bedrock:
    region: ${AWS_REGION:ap-south-1}
    model-id: ${APP_BEDROCK_MODEL_ID:}
